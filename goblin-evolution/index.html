<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Эволюция Гоблина</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://yandex.ru/games/sdk/v2"></script>
</head>
<body>
  <div id="game">
    <!-- Фон -->
    <div class="scene" aria-hidden="true">
      <div class="sky"></div>
      <div class="sun"></div>
      <div class="clouds"></div>
      <div class="hills-far"></div>
      <div class="hills-near"></div>
      <div class="ground"></div>
      <div class="spots"></div>
    </div>

    <!-- Гоблин в центре -->
    <main class="stage" id="stage">
      <div class="goblin-name" id="goblinName">Малыш гоблин</div>
      <div class="goblin-shadow"></div>
      <div class="goblin-wrap" id="goblinWrap">
        <div class="goblin" id="goblin"></div>
      </div>
      <div class="level-pill" title="Уровень гоблина">
        <div class="level-pill-text">
          <span id="levelLabel">Уровень 1</span>
          <span id="levelProgressText">0 / 50</span>
        </div>
        <div class="level-pill-track">
          <div class="level-pill-fill" id="levelProgress"></div>
        </div>
      </div>
    </main>

    <!-- Слой частиц/флоатеров (через всю сцену) -->
    <div class="particles" id="particles" aria-hidden="true"></div>
    <div class="floaters" id="floaters" aria-hidden="true"></div>

    <!-- Левые плитки -->
    <div class="top-left">
      <div class="coin-pill" id="coinPill">
        <div class="coin-pill-icon"></div>
        <div class="coin-pill-amount" id="coinAmount">0</div>
      </div>
      <button class="icon-btn settings-btn" id="settingsBtn" title="Настройки">⚙</button>
    </div>

    <!-- Апгрейды справа -->
    <aside class="upgrades" id="upgrades"></aside>

    <!-- Тост -->
    <div class="toast" id="toast"></div>

    <!-- Модалка настроек -->
    <div class="modal-backdrop" id="settingsModal" hidden>
      <div class="modal">
        <div class="modal-head">
          <div class="modal-title">Настройки</div>
          <button class="icon-btn" id="settingsClose" title="Закрыть">✕</button>
        </div>
        <div class="modal-body">
          <label class="toggle">
            <span class="toggle-label">Звуковые эффекты</span>
            <input type="checkbox" id="sfxToggle" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
          <label class="toggle">
            <span class="toggle-label">Фоновая музыка</span>
            <input type="checkbox" id="musicToggle" checked />
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
          </label>
          <button class="btn btn-danger" id="resetBtn">Сбросить прогресс</button>
          <p class="hint">Клики считаются по всему экрану, пробел — тоже.</p>
        </div>
      </div>
    </div>
  </div>

  <script src="sdk.js"></script>
  <script src="game.js"></script>
</body>
</html>
